<!DOCTYPE html>
<html lang="en">
  <head>
    <title>FM Product Preview Card Component</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/style.css" rel="stylesheet">
    <link rel="icon" href="images/favicon-32x32.png">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap"
      rel="stylesheet">
  </head>
  <body>
    <div class="container">
      <article class="card">
        <picture>
          <source srcset="images/image-product-desktop.jpg" media="(min-width: 600px)">
          <img class="card-image" src="images/image-product-mobile.jpg" alt="Bottle of Gabrielle Eau de Parfum by Chanel">
        </picture>
        <section class="card-copy">
          <h2 class="card-subtitle">Perfume</h2>
          <h1 class="card-title">Gabrielle Essence Eau De Parfum</h1>
          <p class="card-description">A floral, solar and voluptuous interpretation composed by Olivier Polge,
          Perfumer-Creator for the House of CHANEL.</p>
        </section>
        <div class="card-price">
          <span class="new-price">$149.99</span>
          <span class="old-price">$169.99</span>
        </div>
        <a class="card-button"><img class="cart-icon" src="images/icon-cart.svg">Add to Cart</a>
      </article>
    </div>
  </body>
</html>
